      <stop offset="0%" style="stop-color:#FF3F7F;stop-opacity:0.18" />
      <stop offset="60%" style="stop-color:#0D0E12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D0E12;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Brand dark background with a subtle primary glow -->
  <rect width="1200" height="630" fill="#0D0E12" />
